finger_to_tip:
  thumb: thumb_fingertip
  index: index_fingertip
  # ring_mp and middle_mp body labels are physically swapped in the URDF:
  # the body named "ring_mp" occupies the anatomical middle-finger slot and
  # vice-versa. Mapping is corrected here so MANO middle → physical middle.
  middle: ring_fingertip
  ring: middle_fingertip
  pinky: pinky_fingertip

finger_to_base:
  thumb: joint_abd_thumb_jointbody
  index: joint_abd_index_jointbody
  middle: joint_abd_ring_jointbody
  ring: joint_abd_middle_jointbody
  pinky: joint_abd_pinky_jointbody

forearm_and_wrist:
  forearm: tower
  wrist: palm

wrist_name: tower
anchor_name: palm # all transformations are relative to the anchor frame

